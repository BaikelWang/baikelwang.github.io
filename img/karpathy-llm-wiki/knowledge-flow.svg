<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">从原始资料到持续演化 Wiki 的知识编译流程</title>
  <desc id="desc">原始资料经过 LLM 读取、提取、交叉引用和综合，形成持续更新的 Wiki；新的问题和来源继续反馈到 Wiki。</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f9fc"/>
      <stop offset="1" stop-color="#edf4ff"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1e3a5f" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5880b8"/>
    </marker>
  </defs>

  <rect width="1600" height="520" rx="28" fill="url(#background)"/>
  <path d="M 448 260 C 505 260 541 260 600 260" fill="none" stroke="#5880b8" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M 972 260 C 1030 260 1066 260 1125 260" fill="none" stroke="#5880b8" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="70" y="80" width="380" height="360" rx="26" fill="#ffffff" stroke="#d8e2f0" stroke-width="2"/>
    <rect x="600" y="80" width="375" height="360" rx="26" fill="url(#core)"/>
    <rect x="1125" y="80" width="405" height="360" rx="26" fill="#ffffff" stroke="#d8e2f0" stroke-width="2"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <text x="260" y="145" text-anchor="middle" font-size="34" font-weight="700" fill="#17324d">原始资料</text>
    <text x="260" y="182" text-anchor="middle" font-size="20" fill="#6c7f96">Raw Sources · 保持可追溯</text>
    <g fill="#eef4fb" stroke="#6f8fb5" stroke-width="3">
      <rect x="142" y="226" width="98" height="126" rx="10" transform="rotate(-7 191 289)"/>
      <rect x="214" y="213" width="105" height="137" rx="10"/>
      <rect x="287" y="232" width="92" height="118" rx="10" transform="rotate(7 333 291)"/>
    </g>
    <g stroke="#8ca3bd" stroke-width="5" stroke-linecap="round">
      <path d="M 165 258 h48 M 161 278 h54 M 158 298 h42"/>
      <path d="M 237 250 h58 M 237 273 h58 M 237 296 h44 M 237 319 h52"/>
      <path d="M 309 264 h47 M 307 286 h50 M 306 308 h38"/>
    </g>

    <text x="788" y="146" text-anchor="middle" font-size="34" font-weight="700" fill="#ffffff">LLM 编译</text>
    <text x="788" y="183" text-anchor="middle" font-size="20" fill="#dbeafe">读取 · 提取 · 连接 · 综合</text>
    <g fill="none" stroke="#bfdbfe" stroke-width="4">
      <circle cx="788" cy="284" r="91" opacity="0.45"/>
      <circle cx="788" cy="284" r="61" opacity="0.7"/>
      <path d="M 788 193 v182 M 697 284 h182 M 724 220 l128 128 M 852 220 L724 348" opacity="0.55"/>
    </g>
    <circle cx="788" cy="284" r="31" fill="#fbbf24"/>
    <circle cx="788" cy="284" r="15" fill="#fff7d6"/>
    <text x="788" y="409" text-anchor="middle" font-size="20" fill="#e0e7ff">一次理解，持续复用</text>

    <text x="1328" y="145" text-anchor="middle" font-size="34" font-weight="700" fill="#17324d">持续演化的 Wiki</text>
    <text x="1328" y="182" text-anchor="middle" font-size="20" fill="#6c7f96">页面 · 链接 · 矛盾 · 综合</text>
    <g stroke="#7aa2d5" stroke-width="4" fill="none">
      <path d="M 1218 272 L 1300 230 L 1404 266 L 1360 352 L 1257 346 Z"/>
      <path d="M 1300 230 L 1360 352 M 1218 272 L 1404 266 M 1257 346 L 1300 230"/>
    </g>
    <g fill="#ffffff" stroke="#3974bd" stroke-width="4">
      <circle cx="1218" cy="272" r="18"/>
      <circle cx="1300" cy="230" r="18"/>
      <circle cx="1404" cy="266" r="18"/>
      <circle cx="1360" cy="352" r="18"/>
      <circle cx="1257" cy="346" r="18"/>
      <circle cx="1320" cy="296" r="24" fill="#dbeafe"/>
    </g>
  </g>

  <text x="520" y="238" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#4f6f95">INGEST</text>
  <text x="1050" y="238" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#4f6f95">WRITE BACK</text>
</svg>
